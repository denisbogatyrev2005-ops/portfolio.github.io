<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>СтудПортфолио</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;700&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0e0f13;--bg2:#15161c;--bg3:#1c1d26;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f0f0f5;--text2:#8b8ca0;--text3:#5a5b70;--accent:#7c6ff7;--accent2:#5b53e3;--green:#22c878;--green-bg:rgba(34,200,120,0.1);--amber:#f5a623;--amber-bg:rgba(245,166,35,0.1);--red:#f05050;--red-bg:rgba(240,80,80,0.1);--blue:#50a0f0;--blue-bg:rgba(80,160,240,0.1);--radius:12px;--radius-sm:8px;--font-head:'Unbounded',sans-serif;--font-body:'Geologica',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;font-weight:300}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none}
input,textarea,select{font-family:var(--font-body)}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(124,111,247,0.18) 0%,transparent 70%),var(--bg)}
.auth-box{width:440px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:40px}
.auth-logo{font-family:var(--font-head);font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:8px;letter-spacing:-0.02em}
.auth-title{font-family:var(--font-head);font-size:1.4rem;font-weight:500;margin-bottom:6px}
.auth-sub{color:var(--text2);font-size:0.875rem;margin-bottom:24px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:0.78rem;color:var(--text2);margin-bottom:5px;letter-spacing:0.03em;text-transform:uppercase}
.form-input{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.9rem;font-family:var(--font-body);outline:none;transition:border 0.2s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
select.form-input option{background:var(--bg2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 20px;border-radius:var(--radius-sm);font-size:0.875rem;font-weight:500;transition:all 0.2s;cursor:pointer;border:none;font-family:var(--font-body)}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,80,80,0.2)}.btn-danger:hover{background:rgba(240,80,80,0.2)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,200,120,0.2)}.btn-success:hover{background:rgba(34,200,120,0.2)}
.btn-full{width:100%}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.auth-switch{text-align:center;margin-top:18px;font-size:0.85rem;color:var(--text2)}
.auth-switch span{color:var(--accent);cursor:pointer}
.auth-error{background:var(--red-bg);border:1px solid rgba(240,80,80,0.25);border-radius:var(--radius-sm);padding:10px 14px;font-size:0.85rem;color:var(--red);margin-bottom:14px}
.auth-info{background:rgba(124,111,247,0.08);border:1px solid rgba(124,111,247,0.2);border-radius:var(--radius-sm);padding:10px 14px;font-size:0.82rem;color:var(--text2);margin-bottom:14px}
.role-toggle{display:flex;gap:8px;margin-bottom:16px}
.role-btn{flex:1;padding:9px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.85rem;color:var(--text2);background:var(--bg3);transition:all 0.2s;cursor:pointer;font-family:var(--font-body)}
.role-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(124,111,247,0.1)}
#app-screen{display:none;min-height:100vh}
.topbar{height:56px;display:flex;align-items:center;padding:0 24px;background:rgba(21,22,28,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;justify-content:space-between}
.topbar-logo{font-family:var(--font-head);font-size:0.85rem;font-weight:700;color:var(--accent);letter-spacing:-0.02em}
.topbar-user{display:flex;align-items:center;gap:10px;font-size:0.85rem}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;font-family:var(--font-head)}
.av-s{background:rgba(80,160,240,0.2);color:var(--blue)}.av-t{background:rgba(34,200,120,0.2);color:var(--green)}
.btn-logout{font-size:0.8rem;color:var(--text3);padding:5px 10px;border:1px solid var(--border);border-radius:6px;margin-left:8px}.btn-logout:hover{color:var(--red);border-color:rgba(240,80,80,0.3)}
.main{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:220px;flex-shrink:0;padding:16px 12px;border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.nav-section{font-size:0.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:0 8px;margin-bottom:5px;margin-top:14px;font-weight:500}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);font-size:0.85rem;color:var(--text2);cursor:pointer;transition:all 0.15s;border-left:2px solid transparent;margin-bottom:2px}
.nav-item:hover{background:var(--bg3);color:var(--text)}.nav-item.active{background:rgba(124,111,247,0.12);color:var(--accent);border-left-color:var(--accent)}
.nav-badge{margin-left:auto;background:var(--amber-bg);color:var(--amber);font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500}
.content{flex:1;padding:28px 32px;overflow-y:auto;max-width:960px}
.page{display:none}.page.active{display:block}
.page-header{margin-bottom:20px}
.page-title{font-family:var(--font-head);font-size:1.15rem;font-weight:500;margin-bottom:4px}
.page-sub{color:var(--text2);font-size:0.875rem}
.page-hrow{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:12px;transition:border-color 0.2s}
.card:hover{border-color:var(--border2)}
.card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:12px}
.card-title{font-size:0.95rem;font-weight:500}
.card-meta{font-size:0.8rem;color:var(--text2);margin-bottom:6px}
.card-desc{font-size:0.85rem;color:var(--text2);line-height:1.6;margin-bottom:10px}
.card-req{font-size:0.78rem;color:var(--text3);padding:6px 10px;background:var(--bg3);border-radius:6px;margin-bottom:10px}
.card-req strong{color:var(--text2)}
.card-actions{display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;font-size:0.7rem;padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap}
.badge-green{background:var(--green-bg);color:var(--green)}.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-red{background:var(--red-bg);color:var(--red)}.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-gray{background:rgba(255,255,255,0.06);color:var(--text2)}.badge-purple{background:rgba(124,111,247,0.15);color:var(--accent)}
.badge-sport{background:rgba(240,80,80,0.12);color:#f08050}.badge-cultural{background:rgba(200,100,240,0.12);color:#c050f0}
.badge-science{background:var(--blue-bg);color:var(--blue)}.badge-volunteer{background:var(--green-bg);color:var(--green)}
.badge-personal{background:var(--amber-bg);color:var(--amber)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.stat-num{font-family:var(--font-head);font-size:1.7rem;font-weight:500}.stat-lbl{font-size:0.75rem;color:var(--text2);margin-top:3px}
.doc-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.doc-row:last-child{border-bottom:none}
.doc-icon{width:34px;height:34px;background:var(--blue-bg);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-icon.link-icon{background:rgba(124,111,247,0.15)}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:0.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-date{font-size:0.73rem;color:var(--text3);margin-top:2px}
.doc-comment{font-size:0.78rem;color:var(--amber);margin-top:3px;padding:3px 8px;background:var(--amber-bg);border-radius:4px}
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--radius-sm);padding:16px;text-align:center;color:var(--text3);font-size:0.85rem;cursor:pointer;transition:all 0.2s;margin-top:10px}
.upload-zone:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,111,247,0.04)}
.upload-actions{display:flex;gap:8px;margin-top:10px}
.upload-btn{flex:1;padding:10px;border:1.5px dashed var(--border2);border-radius:var(--radius-sm);text-align:center;color:var(--text3);font-size:0.82rem;cursor:pointer;transition:all 0.2s;background:transparent;font-family:var(--font-body)}
.upload-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,111,247,0.04)}
#file-input{display:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.2s;backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;transform:translateY(16px);transition:transform 0.2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-family:var(--font-head);font-size:1rem;font-weight:500;margin-bottom:18px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.students-table{width:100%;border-collapse:collapse}
.students-table th{text-align:left;font-size:0.72rem;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.05em;padding:8px 12px;border-bottom:1px solid var(--border)}
.students-table td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:0.875rem;vertical-align:middle}
.students-table tr:last-child td{border-bottom:none}
.students-table tr:hover td{background:rgba(255,255,255,0.02)}
.review-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:12px}
.tabs{display:flex;gap:4px;background:var(--bg3);border-radius:var(--radius-sm);padding:4px;margin-bottom:18px;flex-wrap:wrap}
.tab-btn{padding:7px 14px;border-radius:6px;font-size:0.82rem;color:var(--text2);cursor:pointer;transition:all 0.15s;font-family:var(--font-body);border:none;background:none}
.tab-btn.active{background:var(--bg2);color:var(--text)}
.search-bar{display:flex;gap:10px;margin-bottom:14px}
.search-input{flex:1;padding:9px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.875rem;font-family:var(--font-body);outline:none}
.search-input:focus{border-color:var(--accent)}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:2.5rem;margin-bottom:12px;opacity:0.5}.empty-text{font-size:0.9rem}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.15);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:11px 16px;font-size:0.875rem;display:flex;align-items:center;gap:9px;animation:slideIn 0.3s ease;max-width:320px}
.toast.success{border-color:rgba(34,200,120,0.3)}.toast.error{border-color:rgba(240,80,80,0.3)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.cat-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-chip{padding:5px 14px;border-radius:20px;font-size:0.78rem;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all 0.15s;font-family:var(--font-body)}
.cat-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(124,111,247,0.1)}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">◆ СтудПортфолио</div>
    <div class="auth-title" id="auth-title">Вход в систему</div>
    <div class="auth-sub" id="auth-sub">Войдите в личный кабинет</div>
    <div id="auth-error" class="auth-error" style="display:none"></div>
    <div id="auth-info" class="auth-info" style="display:none"></div>

    <div id="register-fields" style="display:none">
      <div class="form-group">
        <label class="form-label">Я являюсь</label>
        <div class="role-toggle">
          <button class="role-btn active" id="role-student" onclick="setRole('student')">Студентом</button>
          <button class="role-btn" id="role-teacher" onclick="setRole('teacher')">Преподавателем</button>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Полное имя</label><input class="form-input" id="reg-name" type="text" placeholder="Иванов Алексей Петрович"/></div>
      <div class="form-group" id="group-field"><label class="form-label">Группа</label><input class="form-input" id="reg-group" type="text" placeholder="ИТ-301"/></div>
      <div class="form-group" id="secret-field" style="display:none">
        <label class="form-label">Код преподавателя</label>
        <input class="form-input" id="reg-secret" type="password" placeholder="Введите секретный код"/>
        <div style="font-size:0.75rem;color:var(--text3);margin-top:4px">Код выдаётся администрацией университета</div>
      </div>
    </div>

    <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="auth-email" type="email" placeholder="example@university.ru"/></div>
    <div class="form-group"><label class="form-label">Пароль</label><input class="form-input" id="auth-password" type="password" placeholder="••••••••"/></div>
    <button class="btn btn-primary btn-full" id="auth-btn" onclick="handleAuth()">Войти</button>
    <div class="auth-switch" id="auth-switch">Нет аккаунта? <span onclick="toggleAuthMode()">Зарегистрироваться</span></div>
    <div style="text-align:center;margin-top:10px;font-size:0.75rem;color:var(--text3)">Demo: teacher@portal.ru / teacher123 · student@portal.ru / student123</div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">◆ СтудПортфолио</div>
    <div class="topbar-user">
      <div class="avatar" id="top-avatar"></div>
      <span id="top-name" style="font-size:0.875rem"></span>
      <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-body"></div>
</div>
<div class="toast-container" id="toast-container"></div>
<input type="file" id="file-input" accept=".pdf,.jpg,.jpeg,.png"/>

<script>
const API = 'http://localhost:8000';
let token = localStorage.getItem('sp_token');
let user = null;
let authMode = 'login';
let selectedRole = 'student';
let pendingUploadPartId = null;
let _eventsData = [];
let _studentsData = [];
let _submissions = [];
let _activeCat = 'all';

const CATEGORIES = {
  all:      {label:'Все',         cls:''},
  sport:    {label:'Спортивные',  cls:'badge-sport'},
  cultural: {label:'Культурные',  cls:'badge-cultural'},
  science:  {label:'Научные',     cls:'badge-science'},
  volunteer:{label:'Волонтёрские',cls:'badge-volunteer'},
  personal: {label:'Личные',      cls:'badge-personal'},
};

function catBadge(cat) {
  const c = CATEGORIES[cat] || {label: cat, cls:'badge-gray'};
  return `<span class="badge ${c.cls}" style="font-size:0.68rem">${c.label}</span>`;
}

// ─── UTILS ───────────────────────────────────────────────────────────
function toast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type==='success'?'✓':'✕'}</span> ${msg}`;
  c.appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}
async function api(path, opts={}) {
  const headers = {'Content-Type':'application/json', ...(opts.headers||{})};
  if (token) headers['Authorization'] = `Bearer ${token}`;
  if (opts.body instanceof FormData) delete headers['Content-Type'];
  const r = await fetch(API+path, {...opts, headers});
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail||'Ошибка сервера'); }
  return r.json();
}
function fmtDate(iso) { if(!iso) return ''; return new Date(iso).toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'}); }
function fmtSize(b) { if(!b) return ''; return b>1024*1024?(b/1024/1024).toFixed(1)+' МБ':Math.round(b/1024)+' КБ'; }
function initials(name) { return (name||'').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function statusBadge(s) {
  const m={pending:'amber|На проверке',approved:'green|Принят',rejected:'red|Отклонён',active:'green|Активна',upcoming:'amber|Скоро',closed:'gray|Завершено'};
  const [cls,label]=(m[s]||'gray|—').split('|');
  return `<span class="badge badge-${cls}">${label}</span>`;
}

// ─── AUTH ─────────────────────────────────────────────────────────────
function toggleAuthMode() {
  authMode = authMode==='login'?'register':'login';
  const isReg = authMode==='register';
  document.getElementById('auth-title').textContent = isReg?'Регистрация':'Вход в систему';
  document.getElementById('auth-sub').textContent = isReg?'Создайте аккаунт':'Войдите в личный кабинет';
  document.getElementById('auth-btn').textContent = isReg?'Зарегистрироваться':'Войти';
  document.getElementById('register-fields').style.display = isReg?'block':'none';
  document.getElementById('auth-switch').innerHTML = isReg
    ? 'Уже есть аккаунт? <span onclick="toggleAuthMode()">Войти</span>'
    : 'Нет аккаунта? <span onclick="toggleAuthMode()">Зарегистрироваться</span>';
  document.getElementById('auth-error').style.display='none';
  document.getElementById('auth-info').style.display='none';
  setRole('student');
}
function setRole(r) {
  selectedRole = r;
  document.getElementById('role-student').classList.toggle('active',r==='student');
  document.getElementById('role-teacher').classList.toggle('active',r==='teacher');
  document.getElementById('group-field').style.display = r==='student'?'block':'none';
  document.getElementById('secret-field').style.display = r==='teacher'?'block':'none';
  const info = document.getElementById('auth-info');
  if (r==='teacher') { info.textContent='Для регистрации как преподаватель необходим секретный код, выданный администрацией.'; info.style.display='block'; }
  else info.style.display='none';
}
async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  errEl.style.display='none';
  if (!email||!password) { errEl.textContent='Заполните все поля'; errEl.style.display='block'; return; }
  const btn = document.getElementById('auth-btn');
  btn.innerHTML='<span class="spinner"></span>'; btn.disabled=true;
  try {
    let data;
    if (authMode==='login') {
      const fd = new FormData(); fd.append('username',email); fd.append('password',password);
      const r = await fetch(API+'/api/auth/login',{method:'POST',body:fd});
      if (!r.ok) { const e=await r.json(); throw new Error(e.detail||'Ошибка'); }
      data = await r.json();
    } else {
      const name = document.getElementById('reg-name').value.trim();
      const group = document.getElementById('reg-group').value.trim();
      const secret = document.getElementById('reg-secret')?.value||'';
      if (!name) throw new Error('Введите имя');
      data = await api('/api/auth/register',{method:'POST',body:JSON.stringify({full_name:name,email,password,role:selectedRole,group,secret_code:secret})});
    }
    token=data.access_token; user=data.user;
    localStorage.setItem('sp_token',token);
    initApp();
  } catch(e) { errEl.textContent=e.message; errEl.style.display='block'; }
  finally { btn.textContent=authMode==='login'?'Войти':'Зарегистрироваться'; btn.disabled=false; }
}
function logout() { token=null; user=null; localStorage.removeItem('sp_token'); document.getElementById('app-screen').style.display='none'; document.getElementById('auth-screen').style.display='flex'; }

  if (!user) return;
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  const av=document.getElementById('top-avatar');
  av.textContent=initials(user.full_name); av.className=`avatar ${user.role==='teacher'?'av-t':'av-s'}`;

function renderMyParts(parts) {
  const total=parts.length;
  const approved=parts.filter(p=>p.documents.some(d=>d.status==='approved')).length;
  const pending=parts.filter(p=>p.documents.some(d=>d.status==='pending')).length;
  document.getElementById('my-stats').innerHTML=`
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Мероприятий</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${approved}</div><div class="stat-lbl">Подтверждено</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${pending}</div><div class="stat-lbl">На проверке</div></div>`;
  const el=document.getElementById('my-list');
  if(!parts.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Добавьте мероприятия из каталога</div></div>`;return;}
  el.innerHTML=parts.map(p=>{
    const overallStatus=p.documents.length===0?'pending':p.documents.every(d=>d.status==='approved')?'approved':p.documents.some(d=>d.status==='rejected')?'rejected':'pending';
    return `<div class="card">
      <div class="card-hd">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
            ${catBadge(p.event_category)}
            <div class="card-title">${p.event_title}</div>
          </div>
          <div class="card-meta">${p.event_department} · Добавлено ${fmtDate(p.created_at)}</div>
        </div>
        ${statusBadge(overallStatus)}
      </div>
      ${p.documents.length?`<div style="margin-bottom:4px">${p.documents.map(d=>docRow(d)).join('')}</div>`:''}
      <div class="upload-actions">
        <button class="upload-btn" onclick="openUpload(${p.id})">📎 Прикрепить файл</button>
        <button class="upload-btn" onclick="openLinkModal(${p.id})">🔗 Добавить ссылку</button>
      </div>
    </div>`;
  }).join('');
}

function docRow(d) {
  const isLink = d.doc_type==='link';
  return `<div class="doc-row">
    <div class="doc-icon ${isLink?'link-icon':''}">
      ${isLink
        ? `<svg width="14" height="14" fill="var(--accent)" viewBox="0 0 16 16"><path d="M6.354 5.5H4a3 3 0 000 6h3a3 3 0 002.83-2H9a1 1 0 01-.95-.68A2 2 0 007 9H4a2 2 0 110-4h1.354l1-1zM9 5H7.646l-1 1H9a2 2 0 011.95 1.56A1 1 0 0111 8h.17A3 3 0 009 5z"/></svg>`
        : `<svg width="14" height="14" fill="var(--blue)" viewBox="0 0 16 16"><path d="M9.293 0H4a2 2 0 00-2 2v12a2 2 0 002 2h8a2 2 0 002-2V4.707L9.293 0zM9.5 3.5v-2l3 3h-2a1 1 0 01-1-1z"/></svg>`
      }
    </div>
    <div class="doc-info">
      <div class="doc-name">${isLink?`<a href="${d.link_url}" target="_blank" style="color:var(--accent)">${d.original_name}</a>`:d.original_name}</div>
      <div class="doc-date">${isLink?d.link_url.substring(0,50)+'...':fmtSize(d.file_size)+' · '+fmtDate(d.uploaded_at)}</div>
      ${d.teacher_comment&&d.status==='rejected'?`<div class="doc-comment">Комментарий: ${d.teacher_comment}</div>`:''}
    </div>
    ${statusBadge(d.status)}
    <button class="btn btn-danger" style="padding:3px 8px;font-size:0.72rem" onclick="deleteDoc(${d.id})">✕</button>
  </div>`;
}

function openUpload(partId) { pendingUploadPartId=partId; document.getElementById('file-input').value=''; document.getElementById('file-input').click(); }

document.getElementById('file-input').addEventListener('change', async(e)=>{
  const file=e.target.files[0]; if(!file||!pendingUploadPartId) return;
  try {
    const fd=new FormData(); fd.append('file',file);
    const r=await fetch(`${API}/api/my/participations/${pendingUploadPartId}/documents`,{method:'POST',headers:{Authorization:`Bearer ${token}`},body:fd});
    if(!r.ok){const e=await r.json();throw new Error(e.detail||'Ошибка');}
    toast('Файл загружен!');
    const p=await api('/api/my/participations'); renderMyParts(p);
  } catch(e){toast(e.message,'error');}
});

function openLinkModal(partId) {
  const m=document.getElementById('modal-body');
  m.innerHTML=`<div class="modal-title">Добавить ссылку</div>
    <div class="form-group"><label class="form-label">Название ссылки</label><input class="form-input" id="link-name" placeholder="Сертификат на Госуслугах, страница события и т.п."/></div>
    <div class="form-group"><label class="form-label">URL</label><input class="form-input" id="link-url" placeholder="https://..."/></div>
    <div style="font-size:0.78rem;color:var(--text3);margin-top:-8px">Например: ссылка на сертификат, страницу события, публикацию</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="submitLink(${partId})">Добавить</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

async function submitLink(partId) {
  const url=document.getElementById('link-url').value.trim();
  const name=document.getElementById('link-name').value.trim()||'Ссылка';
  if(!url||!url.startsWith('http')){toast('Введите корректную ссылку','error');return;}
  try {
    await api(`/api/my/participations/${partId}/links`,{method:'POST',body:JSON.stringify({url,name})});
    closeModal(); toast('Ссылка добавлена!');
    const p=await api('/api/my/participations'); renderMyParts(p);
  } catch(e){toast(e.message,'error');}
}

async function deleteDoc(id) {
  if(!confirm('Удалить?')) return;
  try { await api(`/api/my/documents/${id}`,{method:'DELETE'}); toast('Удалено'); const p=await api('/api/my/participations'); renderMyParts(p); }
  catch(e){toast(e.message,'error');}
}

      <td>${s.pending_count>0?`<span style="color:var(--amber);font-weight:500">${s.pending_count}</span>`:'—'}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

// ─── TEACHER: REVIEW ────────────────────────────────────────────────────
async function renderTReview() {
  const c=document.getElementById('content');
  c.innerHTML=`<div class="page active"><div class="page-header"><div class="page-title">Проверка документов</div><div class="page-sub">Принимайте или отклоняйте документы студентов</div></div>
    <div class="tabs"><button class="tab-btn active" id="tab-p" onclick="setRevTab('pending')">На проверке</button><button class="tab-btn" id="tab-a" onclick="setRevTab('all')">Все</button></div>
    <div id="review-list"></div></div>`;
  window._revTab='pending';
  try { _submissions=await api('/api/teacher/submissions'); renderReviewList(); loadPendingCount(); } catch{}
}
function setRevTab(tab){window._revTab=tab;document.getElementById('tab-p').classList.toggle('active',tab==='pending');document.getElementById('tab-a').classList.toggle('active',tab==='all');renderReviewList();}
function renderReviewList(){
  const el=document.getElementById('review-list'); if(!el) return;
  let items=_submissions.flatMap(p=>p.documents.map(d=>({...d,student_name:p.student_name,student_group:p.student_group,event_title:p.event_title,event_category:p.event_category})));
  if(window._revTab==='pending') items=items.filter(d=>d.status==='pending');
  if(!items.length){el.innerHTML=`<div class="empty"><div class="empty-icon">${window._revTab==='pending'?'✓':'📂'}</div><div class="empty-text">${window._revTab==='pending'?'Нет документов на проверке':'Нет документов'}</div></div>`;return;}
  el.innerHTML=items.map(d=>{
    const isLink=d.doc_type==='link';
    return `<div class="review-card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
        <div>
          <div style="font-size:0.95rem;font-weight:500">${d.student_name} <span class="badge badge-purple" style="margin-left:6px">${d.student_group||''}</span></div>
          <div style="font-size:0.8rem;color:var(--text2);margin-top:2px">${catBadge(d.event_category)} ${d.event_title}</div>
        </div>
        ${statusBadge(d.status)}
      </div>
      <div class="doc-row">
        <div class="doc-icon ${isLink?'link-icon':''}">
          ${isLink?`<svg width="14" height="14" fill="var(--accent)" viewBox="0 0 16 16"><path d="M6.354 5.5H4a3 3 0 000 6h3a3 3 0 002.83-2H9a1 1 0 01-.95-.68A2 2 0 007 9H4a2 2 0 110-4h1.354l1-1zM9 5H7.646l-1 1H9a2 2 0 011.95 1.56A1 1 0 0111 8h.17A3 3 0 009 5z"/></svg>`:
          `<svg width="14" height="14" fill="var(--blue)" viewBox="0 0 16 16"><path d="M9.293 0H4a2 2 0 00-2 2v12a2 2 0 002 2h8a2 2 0 002-2V4.707L9.293 0zM9.5 3.5v-2l3 3h-2a1 1 0 01-1-1z"/></svg>`}
        </div>
        <div class="doc-info">
          <div class="doc-name">${isLink?`<a href="${d.link_url}" target="_blank" style="color:var(--accent)">${d.original_name}</a>`:d.original_name}</div>
          <div class="doc-date">${isLink?d.link_url:fmtSize(d.file_size)+' · '+fmtDate(d.uploaded_at)}</div>
        </div>
        ${!isLink?`<a href="${API}/uploads/${d.filename}" target="_blank" class="btn btn-ghost" style="font-size:0.78rem">Открыть</a>`:''}
      </div>
      ${d.status==='pending'?`
        <div style="display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap">
          <input class="form-input" id="cmt-${d.id}" placeholder="Комментарий (необязательно)" style="flex:1;min-width:140px;padding:7px 12px;font-size:0.82rem"/>
          <button class="btn btn-success" onclick="reviewDoc(${d.id},'approved')">Принять</button>
          <button class="btn btn-danger" onclick="reviewDoc(${d.id},'rejected')">Отклонить</button>
        </div>`:d.teacher_comment?`<div class="doc-comment" style="margin-top:8px">Комментарий: ${d.teacher_comment}</div>`:''}
    </div>`;
  }).join('');
}
async function reviewDoc(docId,status){
  const comment=document.getElementById(`cmt-${docId}`)?.value||'';
  try {
    await api(`/api/teacher/documents/${docId}/review`,{method:'POST',body:JSON.stringify({status,comment:comment||null})});
    toast(status==='approved'?'Принято':'Отклонено',status==='approved'?'success':'error');
    _submissions=await api('/api/teacher/submissions'); renderReviewList(); loadPendingCount();
  } catch(e){toast(e.message,'error');}
}

// ─── MODAL ────────────────────────────────────────────────────────────
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

// ─── BOOT ─────────────────────────────────────────────────────────────
if(token) initApp();
</script>
</body>
